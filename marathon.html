<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Registration Form</title>
</head>

<body>
    <form action="">
        <h1>Race Registration!</h1>
        <label for="first">First Name</label>
        <input type="text" name="first" id="first">
        <label for="last">Last Name</label>
        <input type="text" name="last" id="last">
        <br>
        <p>Select a Race:</p>
        <input type="radio" name="race" id="run" value="Fun Run 5k">
        <label for="run">Fun Run 5k</label>
        <br>
        <input type="radio" name="race" id="half" value="Half Marathon">
        <label for="half">Half Marathon</label>
        <br>
        <input type="radio" name="race" id="full" value="Full Marathon">
        <label for="full">Full Marathon</label>
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email">
        <label for="password">Password</label>
        <input type="password" name="password" id="password">
        <br>
        <label for="list">Select Age Group</label>
        <select name="Age Group" id="list">
            <option value="Under 18">Under 18</option>
            <option value="Between 18-30" selected>Between 18-30</option>
            <option value="Above 30">Above 30</option>
        </select>
        <br>
        <button>Register</button>
    </form>
</body>

</html>
